name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # ANTHROPIC_API_KEY intentionally unset; tests must pass without it.
          OPENALEX_EMAIL: ci@example.com

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          python -m pip install --upgrade pip
          pip install pydantic pyyaml pydantic-settings
      - name: Validate PM YAML cells
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          sys.path.insert(0, '.')
          from backend.app.modules.pm_loader import load_all_cells
          cells = load_all_cells(Path("pm_schema"))
          assert len(cells) >= 100, f"Expected >=100 cells, got {len(cells)}"
          print(f"Loaded {len(cells)} PM cells OK")
          PY
