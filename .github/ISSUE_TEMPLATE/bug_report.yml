name: Bug report
description: Something isn't working as documented.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please follow OS-PM's scope policy
        (Volume 11 weaponization is out of scope). Reports requesting
        weaponization-related features will be closed.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      placeholder: |
        Describe the actual behaviour and what you expected.
    validations:
      required: true

  - type: textarea
    id: how_to_reproduce
    attributes:
      label: How to reproduce
      placeholder: |
        Minimal steps. Include the command you ran and the output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OS-PM version
      placeholder: "0.1.0 (or commit SHA)"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.13"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 14"

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
