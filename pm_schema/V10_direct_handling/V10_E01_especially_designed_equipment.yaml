        - "Heavy security perimeter (Cat-I)"
        - "Reinforced storage building"
      planetscope_required:
        - "Heavy concrete and earth berms"
    materials_required:
      - hs_code: "8479"
        name: "Storage racks (criticality-safe geometry)"
