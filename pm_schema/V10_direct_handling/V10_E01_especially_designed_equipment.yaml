      planetscope_required:
        - "HEPA stack array"
    materials_required:
      - hs_code: "8479"
        name: "Alpha-tight glovebox lines"
        strength: strong
      - hs_code: "8421"
        name: "HEPA + charcoal filtration banks"
        strength: medium
      - hs_code: "9027"
        name: "Pu mass-balance NDA instrumentation"
        strength: medium
