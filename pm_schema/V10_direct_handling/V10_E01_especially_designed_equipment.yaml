element: 1
element_name: "Especially Designed Equipment (detection outline)"

policy_note: |
  This cell intentionally describes only the *external observables* of
  facilities that handle separated Pu / U-233 / HEU. Operational details
  (forming, machining, alloy preparation specifics) are out of scope for
  OS-PM and would be V11-territory. Where a category cannot be discussed
  without crossing into weaponization, we mark `redacted_per_vol11_policy`.

processes:
