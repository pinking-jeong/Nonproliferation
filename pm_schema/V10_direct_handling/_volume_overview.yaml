# Physical Model — Volume 10: Direct Handling of Pu / U-233 / HEU (Overview)
# RESTRICTED CONTENT — DETECTION-SIDE ONLY
cell_id: V10_OVERVIEW
volume: 10
volume_name: "Direct Handling of Plutonium / U-233 / HEU"
element: 0
element_name: "Volume Overview"

scope_policy:
  in_scope:
    - "Detection-side indicators that suggest a state operates a metal-handling line for Pu / U-233 / HEU."
    - "Civilian / declared facilities (e.g., MOX feed lines, research reactor HEU storage)."
  out_of_scope_redacted:
    - "Operational details of metal forming, machining, or shaping that are weaponization-adjacent (these belong to V11 and are excluded by OS-PM scope policy)."
    - "Critical mass calculation methodology or specifics."
    - "Implosion / gun-type assembly geometry."

definitions:
  - "Handling separated, weapons-usable nuclear material in pure form (oxide, metal, alloy)."
  - "Adjacent to but distinct from V11 (weaponization). V10 covers civilian / safeguarded handling only."

acquisition_path_position: "plutonium_path/terminal_civilian; uranium_path/HEU_handling_civilian"
inputs:
  - "Pu nitrate / oxide from V07 reprocessing"
  - "HEU UF6 / metal from V03 enrichment (legacy)"
  - "U-233 from thorium cycle (rare)"
outputs:
  - "Civilian Pu metal billets for MOX or fast reactor R&D"
  - "HEU storage (RERTR conversion ongoing globally)"
  - "U-233 research samples"

processes_in_scope:
  - id: civilian_pu_metal_handling
