historical_significance:
  - "Open-source detection of V10 facilities relies almost entirely on the V08/V07 outputs and OSINT, NOT on V10-specific equipment lists."
  - "The IAEA's safeguards approach for separated Pu (Cat-I) is the most stringent; near-real-time monitoring."

